<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>AI Resume Builder</h1>

    <form>
        <input type="text" id="name" placeholder="Full Name"><br><br>

        <h3>Profile Photo</h3>
        <input type="file" id="photo" accept="image/*"><br><br>

        <input type="email" id="email" placeholder="Email"><br><br>

        <input type="tel" id="phone" placeholder="Phone Number">

        <h3>Professional Summary</h3>
        <textarea id="summary" placeholder="Enter Professional Summary"></textarea><br><br>

        <h3>Education</h3>
        <textarea id="education" placeholder="Enter Education"></textarea>

        <h3>Skills</h3>
        <textarea id="skills" placeholder="Enter Skills"></textarea>

        <h3>Work Experience</h3>
        <textarea id="experience" placeholder="Enter Work Experience"></textarea>

        <button type="submit">Generate Resume</button>
        <button type="reset">Clear Form</button>
    </form>

    <hr>

    <h2>Resume Preview</h2>

    <div id="resume-preview">
    <h2 id="preview-name">Your Name</h2>
    <img id="preview-photo"
     src="https://via.placeholder.com/120"
     alt="Profile Photo"
     width="120">
    <p id="preview-email">Your Email</p>

    <h3>Professional Summary</h3>
    <p id="preview-summary"></p>

    <h3>Education</h3>
    <p id="preview-education"></p>

    <h3>Skills</h3>
    <p id="preview-skills"></p>

    <h3>Work Experience</h3>
    <p id="preview-experience"></p>
        
    <h3>Contact Information</h3>
    <p id="preview-phone">Phone Number</p>
    <p id="summary-count">0 / 300 characters</p>
    <button id="download-btn">Download Resume PDF</button>
</div>

    <script src="script.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <footer>
    <p>AI Resume Builder © 2026</p>
    </footer>

</body>
</html>
