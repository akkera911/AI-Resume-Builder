<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Builder</title>
</head>
<body>
    <h1>AI Resume Builder</h1>

    <form>
        <input type="text" placeholder="Full Name"><br><br>
        <input type="email" placeholder="Email"><br><br>
        <input type="tel" placeholder="Phone Number"><br><br>

        <h3>Education</h3>
        <textarea placeholder="Enter Education"></textarea><br><br>

        <h3>Skills</h3>
        <textarea placeholder="Enter Skills"></textarea><br><br>
        <h3>Work Experience</h3>
        <textarea placeholder="Enter Work Experience"></textarea><br><br>

        <button type="submit">Generate Resume</button>
    </form>
</body>
</html>
