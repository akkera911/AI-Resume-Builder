<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>AI Resume Builder</h1>

    <form>
        <input type="text" placeholder="Full Name"><br><br>
        <input type="email" placeholder="Email"><br><br>
        <input type="tel" placeholder="Phone Number"><br><br>
        <input type="text" id="name" placeholder="Full Name"><br><br>
        <input type="email" id="email" placeholder="Email"><br><br>
        <textarea id="summary" placeholder="Enter Professional Summary"></textarea><br><br>

        <h3>Education</h3>
        <textarea placeholder="Enter Education"></textarea><br><br>

        <h3>Skills</h3>
        <textarea placeholder="Enter Skills"></textarea><br><br>
        <h3>Work Experience</h3>
        <textarea placeholder="Enter Work Experience"></textarea><br><br>

        <button type="submit">Generate Resume</button>

        <hr>

        <h2>Resume Preview</h2>

        <div>
        <p>Your generated resume will appear here.</p>
        </div>

        <h3>Professional Summary</h3>
        <textarea placeholder="Enter Professional Summary"></textarea><br><br>
    </form>
        <script src="script.js"></script>
</body>
</html>
